version: "3.9"

services:
  api:
    build: ./apps/api
    command: ["npm", "run", "start:dev"]
    environment:
      - DATABASE_URL=postgresql://credtrust:credtrust@db:5432/credtrust
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FILE_BASE_URL=http://minio:9000
      - FILE_BUCKET=kyc
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    volumes:
      - ./apps/api:/usr/src/app
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: credtrust
      POSTGRES_PASSWORD: credtrust
      POSTGRES_DB: credtrust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
  backup:
    image: postgres:16-alpine
    depends_on:
      - db
    environment:
      PGPASSWORD: credtrust
    volumes:
      - pgbackups:/backups
    entrypoint: >
      sh -c "echo '0 2 * * * pg_dump -h db -U credtrust credtrust > /backups/credtrust-$(date +%F).sql' | crond -f -L /var/log/cron.log"

volumes:
  pgdata:
  minio-data:
  pgbackups:
